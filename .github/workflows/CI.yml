name: Vite Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18" # Specify the version of Node.js you are using

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: web-client/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('web-client/**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: web-client
        run: npm install

      - name: Run Vite build
        working-directory: web-client
        run: npm run build
