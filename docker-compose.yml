services:
  vite-app:
    build:
      context: ./web-client
      dockerfile: Dockerfile # Assuming you have a Dockerfile
    ports:
      - "5173:5173" # Map host port 3001 to container's 3000 (Vite default)
    volumes:
      - ./web-client/src:/app/src # Mount your project's src folder
      - /app/node_modules # Avoid rebuilding node_modules inside the container
    environment:
      - CHOKIDAR_USEPOLLING=true # Enable file watching on some systems
    command: npm run dev # Start Vite's development server
    networks:
          - intune-depot-app
  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 'Joseph1356'
    ports:
      - 3306:3306
    volumes:
      - mariadb:/var/lib/mysql:Z
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
volumes:
  mariadb:
networks:
  default:
      name: "intune-depot-app"
      external: true
networks:
    intune-depot-app:
      external: true