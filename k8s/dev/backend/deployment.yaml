apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: anchordesk
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # Wait for Postgres to accept connections before starting the app.
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "waiting for db..."; sleep 3
              done
              echo "db is ready"

        # Apply Prisma schema to the database (idempotent).
        - name: prisma-db-push
          image: ghcr.io/spilloid/anchordesk-backend:latest
          imagePullPolicy: Always
          command: ["npx", "prisma", "db", "push", "--skip-generate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: DATABASE_URL

      containers:
        - name: backend
          image: ghcr.io/spilloid/anchordesk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8060
          env:
            - name: SERVER_PORT
              value: "8060"
            - name: NODE_ENV
              value: development
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: DATABASE_URL
            - name: OIDC_DISABLED
              value: "true"   # flip to false and set OIDC_* secrets for real auth
            - name: OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_ISSUER_URL
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_CLIENT_SECRET
                  optional: true
            # Auth (1.1.0): session signing, public base URL, bootstrap admin, SAML.
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: APP_BASE_URL
                  optional: true
            - name: AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: AUTH_SESSION_SECRET
                  optional: true
            - name: BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: BOOTSTRAP_ADMIN_USERNAME
                  optional: true
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: BOOTSTRAP_ADMIN_PASSWORD
                  optional: true
            - name: SAML_ENTRY_POINT
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: SAML_ENTRY_POINT
                  optional: true
            - name: SAML_IDP_CERT
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: SAML_IDP_CERT
                  optional: true
          readinessProbe:
            httpGet:
              path: /ping
              port: 8060
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8060
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
