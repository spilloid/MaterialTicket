apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  namespace: anchordesk
  labels:
    app: web-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # Wait for backend to be ready before serving the frontend.
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://backend:8060/ping > /dev/null 2>&1; do
                echo "waiting for backend..."; sleep 3
              done
              echo "backend is ready"

      containers:
        - name: web-client
          image: ghcr.io/spilloid/anchordesk-web-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
