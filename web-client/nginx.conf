server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket live-update channel (1.7.0). Must come before /api/ so the
    # Upgrade/Connection headers are set for the socket handshake; the /api
    # prefix is stripped to reach the backend's /ws route.
    location /api/ws {
        proxy_pass http://backend:8060/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass http://backend:8060/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy probe self-service endpoints (heartbeat + device ingest). Probes on
    # customer LANs hit the public web-client URL, so /probe/ must reach the
    # backend (it authenticates by X-Probe-Key, not a session).
    location /probe/ {
        proxy_pass http://backend:8060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy MCP server (SSE + message endpoints)
    location /mcp/ {
        proxy_pass http://backend:8060/mcp/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for SSE connections to stay open
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Immutable hashed build assets (Vite fingerprints filenames) — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all non-asset routes serve index.html. Never cache the app
    # shell, so a new deploy is picked up immediately without a manual hard-refresh
    # or CDN purge. The fingerprinted assets above stay cached forever.
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
